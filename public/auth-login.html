<!doctype html><html lang="en" data-theme="auto"><head>
<meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Login — Media Timeline</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link rel="stylesheet" href="/css/theme.css">
</head><body style="font-family:'Plus Jakarta Sans',sans-serif;margin:0">

    <h2>Login</h2>

    <button id="login" class="btn btn-primary">Login</button>
    <span id="msg" style="margin-left:8px;opacity:.8"></span>
    <div style="margin-top:10px"><a href="/auth-signup.html">Create account →</a></div>
    <div style="margin-top:20px"><a href="/">← Back to Home</a></div>
  </div>
