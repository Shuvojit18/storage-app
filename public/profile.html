<!doctype html><html lang="en" data-theme="auto"><head>
<meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Profile — Media Timeline</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/theme.css">
</head><body style="font-family:'Plus Jakarta Sans',sans-serif;margin:0">
  <div class="wrap" style="max-width:760px;margin:40px auto;padding:20px;border:1px solid var(--border);border-radius:18px;background:var(--bg-2)">
    <h2>Your Profile</h2>
    <div style="display:flex;gap:14px;align-items:center;flex-wrap:wrap">
      <img id="avatar" alt="avatar" style="width:88px;height:88px;border-radius:50%;object-fit:cover;background:#ddd">
      <div>
        <div>Name<br><input id="name"></div>
        <div style="margin-top:8px">Email<br><input id="email" disabled></div>
        <div style="margin-top:8px">Joined<br><input id="joined" disabled></div>
      </div>
    </div>
    <div style="margin-top:10px;display:flex;gap:8px">
      <button id="save" class="btn btn-primary">Save</button>
      <label class="btn btn-outline"><input id="pick" type="file" accept="image/*" style="display:none">Change avatar</label>
    </div>
    <div style="margin-top:18px"><a href="/">← Back to Timeline</a></div>
  </div>
  <script type="module" src="/js/profile.js"></script>
</body></html>
